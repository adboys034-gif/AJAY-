<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<link rel="stylesheet" href="dashboard.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<div class="dashboard">

    <div class="sidebar">

        <h2>Dashboard</h2>

        <ul>
            <li><i class="fas fa-home"></i> Home</li>
            <li><i class="fas fa-user-graduate"></i> Students</li>
            <li><i class="fas fa-book"></i> Courses</li>
            <li><i class="fas fa-chart-line"></i> Reports</li>
        </ul>

        <a href="portfolio.html" class="portfolio-link">
            View Portfolio
        </a>

    </div>

    <div class="main-content">

        <div class="topbar">
            <h1>Student Dashboard</h1>
        </div>

        <div class="cards">

            <div class="card">
                <h2>250</h2>
                <p>Students</p>
            </div>

            <div class="card">
                <h2>12</h2>
                <p>Courses</p>
            </div>

            <div class="card">
                <h2>95%</h2>
                <p>Result</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>
